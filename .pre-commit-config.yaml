repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: php-lint
        name: PHP Lint
        entry: php -l
        language: system
        files: \.php$
      - id: phpstan
        name: PHPStan
        entry: nginx/vendor/bin/phpstan analyse --no-progress --configuration=phpstan.neon.dist --memory-limit=2G
        language: system
        files: \.php$
        pass_filenames: false
