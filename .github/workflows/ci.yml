name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: updater
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: updater/pyproject.toml

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run python -m pytest tests -v

      - name: Run bandit
        run: uv run bandit -c pyproject.toml -r .

      - name: Run pyright
        run: uv run pyright

      - name: Run radon
        run: uv run radon cc . -a -nc

      - name: Run vulture
        run: uv run vulture . --exclude .venv,migrations,tests

  php:
    name: PHP static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: memcached, mysqli, gd

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --configuration=phpstan.neon.dist
